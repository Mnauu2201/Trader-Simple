<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0b0e11"/>
  
  <!-- Candlesticks -->
  <!-- Candle 1 - red (bearish) -->
  <line x1="7" y1="8" x2="7" y2="12" stroke="#f6465d" stroke-width="1.5"/>
  <rect x="4.5" y="12" width="5" height="7" fill="#f6465d" rx="0.5"/>
  <line x1="7" y1="19" x2="7" y2="23" stroke="#f6465d" stroke-width="1.5"/>
  
  <!-- Candle 2 - green (bullish) -->
  <line x1="14" y1="6" x2="14" y2="10" stroke="#0ecb81" stroke-width="1.5"/>
  <rect x="11.5" y="10" width="5" height="9" fill="#0ecb81" rx="0.5"/>
  <line x1="14" y1="19" x2="14" y2="24" stroke="#0ecb81" stroke-width="1.5"/>
  
  <!-- Candle 3 - red (bearish) -->
  <line x1="21" y1="9" x2="21" y2="13" stroke="#f6465d" stroke-width="1.5"/>
  <rect x="18.5" y="13" width="5" height="6" fill="#f6465d" rx="0.5"/>
  <line x1="21" y1="19" x2="21" y2="22" stroke="#f6465d" stroke-width="1.5"/>
  
  <!-- Candle 4 - green (bullish) -->
  <line x1="28" y1="7" x2="28" y2="11" stroke="#0ecb81" stroke-width="1.5"/>
  <rect x="25.5" y="11" width="5" height="8" fill="#0ecb81" rx="0.5"/>
  <line x1="28" y1="19" x2="28" y2="23" stroke="#0ecb81" stroke-width="1.5"/>
  
  <!-- MA line -->
  <polyline points="7,16 14,13 21,15 28,12" fill="none" stroke="#f0b90b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
